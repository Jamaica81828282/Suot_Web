<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suot | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../dashboard/dashboard.css">
    <link rel="stylesheet" href="profile.css">
    <style>
        /* Loading state */
        .profile-loading {
            display: flex; align-items: center; justify-content: center;
            min-height: 200px; gap: 12px; color: #bbb; font-size: 14px;
        }
        .loading-spin {
            width: 20px; height: 20px;
            border: 2.5px solid #f0dfe5;
            border-top-color: #C994A7;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Avatar upload overlay */
        .avatar-upload-overlay {
            position: absolute; inset: 0; border-radius: 50%;
            background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s; cursor: pointer; z-index: 2;
        }
        .profile-pic-section:hover .avatar-upload-overlay { opacity: 1; }
        .avatar-upload-overlay span { color: #fff; font-size: 1.3rem; }

        /* ══ INSTAGRAM 3-COL GRID ══ */
        #profileGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px; flex: 1; min-width: 0; width: 100%;
        }
        .pg-card {
            aspect-ratio: 1/1; overflow: hidden;
            position: relative; cursor: pointer; background: #f0dfe5;
        }
        .pg-card img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform 0.35s ease;
        }
        .pg-card:hover img { transform: scale(1.07); }
        .pg-card-hover {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.42);
            display: flex; align-items: center; justify-content: center;
            gap: 24px; opacity: 0; transition: opacity 0.2s;
        }
        .pg-card:hover .pg-card-hover { opacity: 1; }
        .pg-hover-stat {
            display: flex; align-items: center; gap: 6px;
            color: #fff; font-size: 15px; font-weight: 700;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .pg-hover-stat svg { width: 20px; height: 20px; }

        /* Empty state */
        .pg-empty {
            grid-column: 1/-1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 70px 20px; gap: 14px; text-align: center;
        }
        .pg-empty-icon { font-size: 3.2rem; }
        .pg-empty h3 { font-size: 1.1rem; font-weight: 700; color: #333; margin: 0; }
        .pg-empty p  { font-size: 0.85rem; color: #aaa; margin: 0; }
        .pg-empty-btn {
            padding: 10px 24px; background: #4A635D; color: #fff;
            border: none; border-radius: 50px; font-family: 'Inter', sans-serif;
            font-weight: 700; font-size: 0.88rem; cursor: pointer;
        }
        .pg-empty-btn:hover { opacity: 0.85; }

        /* ══ LIGHTBOX ══ */
        .lb-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.86);
            display: flex; align-items: center; justify-content: center;
            z-index: 4000; padding: 16px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
        }
        .lb-overlay.open { opacity: 1; visibility: visible; }
        .lb-box {
            background: #fff; border-radius: 4px;
            width: 100%; max-width: 960px;
            height: min(90vh, 680px);
            display: flex; overflow: hidden;
            transform: scale(0.97);
            transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
            box-shadow: 0 30px 90px rgba(0,0,0,0.5);
        }
        .lb-overlay.open .lb-box { transform: scale(1); }
        .lb-img-col {
            flex: 0 0 58%; background: #000;
            position: relative; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
        }
        .lb-img-col img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .lb-img-placeholder { font-size: 6rem; color: #444; }
        .lb-nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 30px; height: 30px; border-radius: 50%;
            background: rgba(255,255,255,0.9); border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25); transition: background 0.15s;
        }
        .lb-nav-btn:hover { background: #fff; }
        .lb-nav-btn svg { width: 13px; height: 13px; }
        .lb-nav-prev { left: 10px; }
        .lb-nav-next { right: 10px; }
        .lb-info-col {
            flex: 0 0 42%; display: flex; flex-direction: column;
            overflow: hidden; border-left: 1px solid #efefef;
        }
        .lb-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 13px 16px; border-bottom: 1px solid #efefef; flex-shrink: 0;
        }
        .lb-header-user { display: flex; align-items: center; gap: 10px; }
        .lb-avatar-ring {
            width: 36px; height: 36px; border-radius: 50%;
            overflow: hidden; flex-shrink: 0; border: 2px solid #f0dfe5;
        }
        .lb-avatar-ring img { width: 100%; height: 100%; object-fit: cover; }
        .lb-hdr-name { font-size: 13.5px; font-weight: 700; color: #1a1a1a; }
        .lb-hdr-sub  { font-size: 11px; color: #C994A7; font-weight: 600; }
        .lb-close-btn {
            background: none; border: none; font-size: 1.6rem;
            color: #999; cursor: pointer; line-height: 1; padding: 0 2px;
        }
        .lb-close-btn:hover { color: #111; }
        .lb-scroll-body {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
        }
        .lb-scroll-body::-webkit-scrollbar { width: 3px; }
        .lb-scroll-body::-webkit-scrollbar-thumb { background: #f0dfe5; border-radius: 3px; }
        .lb-title-wrap { padding: 13px 16px 10px; border-bottom: 1px solid #efefef; }
        .lb-item-name { font-size: 1rem; font-weight: 700; color: #1a1a1a; margin: 0 0 4px; line-height: 1.25; }
        .lb-item-price { font-size: 1.05rem; font-weight: 800; color: #4A635D; }
        .lb-item-price small { font-size: 0.72rem; font-weight: 500; color: #bbb; margin-left: 2px; }
        .lb-meta-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px; border-bottom: 1px solid #efefef; }
        .lb-meta-pill { background: #faf4f6; border: 1px solid #f0dfe5; border-radius: 10px; padding: 6px 10px; }
        .lb-meta-lbl { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: #C994A7; }
        .lb-meta-val { font-size: 12px; font-weight: 700; color: #4A635D; }
        .lb-tags-row { display: flex; flex-wrap: wrap; gap: 5px; padding: 9px 16px; border-bottom: 1px solid #efefef; }
        .lb-tag { padding: 3px 10px; border-radius: 50px; border: 1.5px solid #eee; font-size: 11px; font-weight: 600; color: #999; }
        .lb-comments-list { padding: 10px 16px; display: flex; flex-direction: column; gap: 10px; }
        .lb-comment-row { display: flex; gap: 9px; }
        .lb-cmt-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1.5px solid #f0dfe5; }
        .lb-cmt-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .lb-cmt-body { font-size: 13px; line-height: 1.5; color: #333; flex: 1; }
        .lb-cmt-body strong { font-weight: 700; margin-right: 4px; }
        .lb-cmt-time { font-size: 10px; color: #aaa; display: block; margin-top: 2px; }
        .lb-no-cmt { font-size: 12px; color: #ccc; text-align: center; padding: 14px 0; }
        .lb-bottom { border-top: 1px solid #efefef; flex-shrink: 0; }
        .lb-action-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px 6px; }
        .lb-act-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; transition: transform 0.15s; }
        .lb-act-btn:hover { transform: scale(1.15); }
        .lb-act-btn svg { width: 23px; height: 23px; }
        .lb-heart svg { color: #bbb; fill: none; }
        .lb-heart.liked svg { color: #ed4956; fill: #ed4956; }
        .lb-heart.liked { animation: hpop 0.35s ease; }
        @keyframes hpop { 0%{transform:scale(1)} 40%{transform:scale(1.4)} 70%{transform:scale(0.9)} 100%{transform:scale(1)} }
        .lb-bookmark svg { color: #bbb; fill: none; }
        .lb-bookmark.saved svg { color: #4A635D; fill: #4A635D; }
        .lb-like-count { font-size: 13px; font-weight: 700; color: #1a1a1a; padding: 0 16px 3px; }
        .lb-post-date  { font-size: 10px; color: #bbb; padding: 0 16px 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .lb-swap-btn {
            margin: 0 16px 8px; width: calc(100% - 32px); padding: 11px;
            background: linear-gradient(135deg, #4A635D, #37504A);
            border: none; border-radius: 8px; font-family: 'Inter', sans-serif;
            font-size: 13px; font-weight: 700; color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 7px;
            transition: opacity 0.2s, transform 0.15s;
        }
        .lb-swap-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .lb-swap-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
        .lb-owner-row { display: flex; gap: 7px; padding: 0 16px 10px; }
        .lb-btn-edit { flex: 1; padding: 9px; background: #f0f0f0; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; color: #4A635D; cursor: pointer; transition: background 0.2s; }
        .lb-btn-edit:hover { background: #ddeae7; }
        .lb-btn-delete { flex: 1; padding: 9px; background: none; border: 1.5px solid #f5c6c6; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; color: #c0392b; cursor: pointer; transition: background 0.2s; }
        .lb-btn-delete:hover { background: #fdf0ee; }
        .lb-cmt-input-row { display: flex; align-items: center; gap: 8px; padding: 9px 16px; border-top: 1px solid #efefef; }
        .lb-cmt-input { flex: 1; background: none; border: none; font-family: 'Inter', sans-serif; font-size: 13px; color: #333; outline: none; }
        .lb-cmt-input::placeholder { color: #ccc; }
        .lb-cmt-post { background: none; border: none; padding: 0; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; color: #C994A7; cursor: pointer; opacity: 0.3; transition: opacity 0.15s; }
        .lb-cmt-post.ready { opacity: 1; }
        .lb-cmt-actions { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
        .lb-cmt-like-btn, .lb-cmt-reply-btn {
            background: none; border: none; cursor: pointer; padding: 0;
            font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
            color: #bbb; display: flex; align-items: center; gap: 4px; transition: color 0.15s;
        }
        .lb-cmt-like-btn:hover { color: #ed4956; }
        .lb-cmt-reply-btn:hover { color: #4A635D; }
        .lb-cmt-like-btn svg, .lb-cmt-reply-btn svg { width: 12px; height: 12px; }
        .lb-cmt-like-btn.liked { color: #ed4956; }
        .lb-cmt-like-btn.liked svg { fill: #ed4956; }
        .lb-cmt-likes-count { font-size: 11px; color: #bbb; }
        .lb-reply-form {
            display: none; align-items: center; gap: 8px;
            margin-top: 6px; padding: 7px 10px;
            background: #faf4f6; border-radius: 10px;
        }
        .lb-reply-form.open { display: flex; }
        .lb-reply-input { flex: 1; background: none; border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 12px; color: #333; }
        .lb-reply-input::placeholder { color: #ccc; }
        .lb-reply-post { background: none; border: none; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; color: #C994A7; cursor: pointer; opacity: 0.35; transition: opacity 0.15s; padding: 0; }
        .lb-reply-post.ready { opacity: 1; }
        .lb-replies-list { margin-top: 6px; display: flex; flex-direction: column; gap: 8px; }
        .lb-reply-row { display: flex; gap: 8px; padding-left: 4px; border-left: 2px solid #f0dfe5; margin-left: 4px; }
        .lb-reply-avatar { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1px solid #f0dfe5; }
        .lb-reply-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .lb-reply-body { font-size: 12px; line-height: 1.5; color: #444; flex: 1; }
        .lb-reply-body strong { font-weight: 700; margin-right: 3px; }
        .lb-reply-time { font-size: 10px; color: #bbb; display: block; margin-top: 1px; }
        .story-viewers-panel { display: none; flex-direction: column; gap: 0; max-height: 220px; overflow-y: auto; padding: 0 16px; }
        .story-viewers-panel::-webkit-scrollbar { width: 3px; }
        .story-viewers-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 3px; }
        .story-viewers-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,.45); padding: 12px 0 8px; display: flex; align-items: center; gap: 6px; }
        .story-viewers-label svg { width: 12px; height: 12px; }
        .story-viewer-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-top: 1px solid rgba(255,255,255,.08); }
        .story-viewer-av { width: 30px; height: 30px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,.2); }
        .story-viewer-av img { width: 100%; height: 100%; object-fit: cover; }
        .story-viewer-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.85); }
        .story-viewer-time { font-size: 10px; color: rgba(255,255,255,.4); margin-top: 1px; }
        .story-no-viewers { font-size: 12px; color: rgba(255,255,255,.35); text-align: center; padding: 14px 0; }
        .story-dots-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; color: rgba(255,255,255,.7); display: flex; align-items: center; border-radius: 6px; transition: background .15s; position: relative; }
        .story-dots-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
        .story-dots-btn svg { width: 18px; height: 18px; }
        .story-dots-menu { position: absolute; top: calc(100% + 4px); right: 0; background: rgba(30,30,30,.96); border-radius: 10px; padding: 4px; min-width: 140px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,.4); display: none; flex-direction: column; }
        .story-dots-menu.open { display: flex; }
        .story-dots-menu button { background: none; border: none; cursor: pointer; padding: 9px 13px; text-align: left; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; border-radius: 7px; transition: background .15s; display: flex; align-items: center; gap: 8px; }
        .story-dots-menu button svg { width: 14px; height: 14px; }
        .story-dots-menu .menu-delete { color: #ff6b6b; }
        .story-dots-menu .menu-delete:hover { background: rgba(255,107,107,.15); }
        .lb-edit-panel { display: none; flex-direction: column; flex: 1; overflow-y: auto; padding: 14px 16px; gap: 10px; }
        .lb-edit-panel::-webkit-scrollbar { width: 3px; }
        .lb-edit-panel::-webkit-scrollbar-thumb { background: #f0dfe5; }
        .lb-edit-panel.open { display: flex; }
        .lb-edit-hd { font-size: 14px; font-weight: 700; color: #1a1a1a; padding-bottom: 10px; border-bottom: 1px solid #f0eded; }
        .ef { display: flex; flex-direction: column; gap: 4px; }
        .ef label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #bbb; }
        .ef input, .ef select, .ef textarea { width: 100%; padding: 8px 11px; border: 1.5px solid #f0f0f0; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 13px; color: #333; outline: none; background: #fdfcfc; transition: border-color 0.2s; appearance: none; }
        .ef input:focus, .ef select:focus, .ef textarea:focus { border-color: #C994A7; }
        .ef textarea { resize: vertical; min-height: 56px; }
        .ef-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .ef-pts-wrap { position: relative; }
        .ef-pts-wrap input { padding-right: 36px; }
        .ef-pts-sfx { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: 700; color: #C994A7; pointer-events: none; }
        .ef-size-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; }
        .ef-sz { padding: 6px 2px; text-align: center; border-radius: 8px; font-size: 11px; font-weight: 600; border: 1.5px solid #eee; cursor: pointer; color: #bbb; background: transparent; font-family: 'Inter', sans-serif; transition: all 0.15s; }
        .ef-sz:hover { border-color: #C994A7; color: #C994A7; }
        .ef-sz.selected { background: #4A635D; border-color: #4A635D; color: #fff; }
        .ef-cond-track { height: 6px; background: #f5f0f2; border-radius: 10px; margin: 8px 0 4px; cursor: pointer; position: relative; }
        .ef-cond-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #6b8f87, #4A635D); transition: width 0.3s; position: relative; }
        .ef-cond-fill::after { content: ''; position: absolute; right: -5px; top: -4px; width: 14px; height: 14px; background: #4A635D; border: 2.5px solid #fff; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
        .ef-cond-labels { display: flex; justify-content: space-between; font-size: 9px; color: #bbb; font-weight: 600; }
        .lb-edit-btns { display: flex; gap: 8px; margin-top: auto; padding-top: 12px; border-top: 1px solid #f0eded; }
        .lb-edit-back { padding: 10px 14px; background: none; border: 1.5px solid #eee; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; }
        .lb-edit-back:hover { border-color: #ccc; color: #444; }
        .lb-edit-save { flex: 1; padding: 11px; background: linear-gradient(135deg, #4A635D, #37504A); border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; }
        .lb-edit-save:hover { opacity: 0.9; }
        #postCountDisplay { font-weight: 700; }
        .loader-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .loader-spinner { width: 60px; height: 60px; border: 6px solid #f0dfe5; border-top-color: var(--deep-forest); border-radius: 50%; animation: spin 0.8s linear infinite; }

        /* ══ BADGES TAB ══ */
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px; padding: 20px 0; width: 100%;
        }
        .badge-card {
            background: #fff; border: 1.5px solid #ede8ea; border-radius: 18px;
            padding: 20px 16px; display: flex; flex-direction: column;
            align-items: center; gap: 10px; text-align: center;
            transition: box-shadow .2s, transform .2s; position: relative; overflow: hidden;
        }
        .badge-card:hover { box-shadow: 0 8px 24px rgba(201,148,167,.15); transform: translateY(-2px); }
        .badge-card.earned { border-color: #C994A7; background: linear-gradient(135deg, #fff8fa, #fff); }
        .badge-card.locked { opacity: .6; }
        .badge-icon { font-size: 38px; line-height: 1; }
        .badge-name { font-size: 13px; font-weight: 700; color: #1a1a1a; }
        .badge-desc { font-size: 11px; color: #888; line-height: 1.5; }
        .badge-progress-wrap { width: 100%; }
        .badge-progress-bar { height: 6px; background: #f0dfe5; border-radius: 6px; overflow: hidden; margin-bottom: 4px; }
        .badge-progress-fill { height: 100%; background: linear-gradient(90deg, #C994A7, #b07f92); border-radius: 6px; transition: width .4s ease; }
        .badge-progress-fill.complete { background: linear-gradient(90deg, #4A635D, #5d7a73); }
        .badge-progress-label { font-size: 10.5px; font-weight: 700; color: #888; }
        .badge-claim-btn {
            width: 100%; padding: 9px; border-radius: 50px;
            background: linear-gradient(135deg, #4A635D, #5d7a73);
            border: none; color: #fff; font-family: 'Inter', sans-serif;
            font-size: 12px; font-weight: 700; cursor: pointer;
            transition: opacity .2s, transform .15s;
        }
        .badge-claim-btn:hover { opacity: .9; transform: translateY(-1px); }
        .badge-claim-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .badge-claimed-pill { padding: 5px 14px; border-radius: 50px; background: #edf7f4; color: #16a34a; font-size: 11.5px; font-weight: 700; }
        .badge-locked-icon { font-size: 11px; color: #bbb; font-weight: 600; }
        .badge-earned-glow { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #C994A7, #b07f92); border-radius: 18px 18px 0 0; }
        .badges-loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 60px 20px; color: #bbb; font-size: 13px; }
        .badges-empty { text-align: center; padding: 60px 20px; color: #bbb; font-size: 13px; }
        .badges-empty span { font-size: 2.5rem; display: block; margin-bottom: 12px; }
    </style>
</head>
<body class="dash-body">

<div id="profileLoader" class="loader-overlay">
    <div class="loader-spinner"></div>
</div>
<aside class="side-nav" id="sideNav">
    <div class="nav-brand">
        <img src="../auth/Logo/logo.jpg" alt="Suot" class="dash-logo">
    </div>
    <div class="category-list" id="sideNavLinks">
        <button class="cat-link" onclick="location.href='../dashboard/dashboard.html'">← Back to Shop</button>
    </div>
</aside>

<main class="main-content">
    <header class="profile-header" id="profileHeader">
        <div class="profile-loading">
            <div class="loading-spin"></div> Loading profile…
        </div>

<script type="module">
import { supabase, fetchFollowers, fetchFollowing, fetchStories, postStory as dbSaveStory, pruneExpiredStories, fetchComments, addComment, addReply, toggleCommentLike, fetchCommentLikes, recordStoryView, fetchStoryViewers, deleteStory, createNotification, fetchUserBadgeProgress, claimBadge } from '../db/supabase.js'
import { lsGet, lsSet } from '../db/ls.js'

const CONDITIONS   = ['Well Loved','Good','Very Good','Like New','Brand New']
const FALLBACK     = 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800'
const STORY_EXPIRY = 24 * 60 * 60 * 1000
const STORY_DUR    = 5000

let currentUser    = null
let currentProfile = null
let myProfile      = null
let activeTab      = 'posted'
let lbId           = null
let lbIdx          = 0
let editCondIdx    = 3
let stories        = []
let curStory       = 0
let storyTimer     = null
const __suot_uid   = localStorage.getItem('suotUserId') || 'anon'

// ══════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════
async function boot() {
    document.getElementById('profileLoader').style.display = 'flex'
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = '../auth/login.html'; return }
    currentUser = session.user

    try { const cached = lsGet('profile'); if (cached) { currentProfile = cached; renderHeader(true, false) } } catch(e) {}

    try {
        const legacy = ['suot_posted_items','suot_wishlist','suotCollection']
        for (const k of legacy) {
            const val = localStorage.getItem(k); if (!val) continue
            const nk  = `suot_${k.replace(/^suot_/, '')}_${currentUser.id}`
            const existing = localStorage.getItem(nk)
            if (!existing) { localStorage.setItem(nk, val) } else {
                try {
                    const a = JSON.parse(existing), b = JSON.parse(val)
                    const merged = Array.isArray(a) ? [...a] : []
                    if (Array.isArray(b)) b.forEach(item => { if (!merged.some(i=>JSON.stringify(i)===JSON.stringify(item))) merged.push(item) })
                    localStorage.setItem(nk, JSON.stringify(merged))
                } catch(_) {}
            }
            localStorage.removeItem(k)
        }
    } catch(e) {}

    const params    = new URLSearchParams(window.location.search)
    const otherName = params.get('user')
    const otherId   = params.get('userId')
    let profile
    if (otherId) { const { data: p } = await supabase.from('profiles').select('*').eq('id', otherId).maybeSingle(); if (p) profile = p }
    if (!profile && otherName) { const { data: p } = await supabase.from('profiles').select('*').eq('username', otherName).maybeSingle(); if (p) profile = p }
    if (!profile) { const { data: p } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single(); profile = p }
    if (!profile) {
        const fallbackName = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0]
        const { data: newProfile } = await supabase.from('profiles')
            .insert({ id: currentUser.id, username: fallbackName.toLowerCase().replace(/\s+/g,'_'), display_name: fallbackName, bio:'', avatar_url: null, pts: 1200, followers_count: 0, following_count: 0 })
            .select().single()
        profile = newProfile
    }
    currentProfile = profile
    try { lsSet('profile', profile) } catch(e) {}

    if (currentUser.id === currentProfile.id) { myProfile = currentProfile } else {
        const { data: mp } = await supabase.from('profiles').select('id, display_name, username, avatar_url').eq('id', currentUser.id).single()
        myProfile = mp || { id: currentUser.id, display_name: currentUser.email?.split('@')[0] || 'Someone' }
    }

    const isOwner = currentUser && currentProfile && currentUser.id === currentProfile.id
    let amFollowing = false
    if (!isOwner) {
        const { data: fRow } = await supabase.from('follows').select('id').eq('follower_id', currentUser.id).eq('following_id', currentProfile.id).maybeSingle()
        amFollowing = !!fRow
    }

    const [{ count: followerCount }, { count: followingCount }] = await Promise.all([
        supabase.from('follows').select('*', { count: 'exact', head: true }).eq('following_id', profile.id),
        supabase.from('follows').select('*', { count: 'exact', head: true }).eq('follower_id',  profile.id)
    ])
    profile.followers_count = followerCount || 0
    profile.following_count = followingCount || 0

    renderHeader(isOwner, amFollowing)
    loadProfileBadgeIcons()
    renderSidebar(isOwner)

    function renderSidebar(isOwner) {
        const nav = document.getElementById('sideNavLinks'); if (!nav) return
        if (isOwner) {
            nav.innerHTML = `<button class="cat-link" onclick="location.href='../dashboard/dashboard.html'">← Back to Shop</button><p class="category-label" style="margin-top:20px">Personal</p><button class="cat-link active">My Profile</button><button class="cat-link" onclick="location.href='../personal/collection.html'">My Collection</button><button class="cat-link" onclick="location.href='../personal/settings.html'">Settings</button>`
        } else {
            nav.innerHTML = `<button class="cat-link" onclick="location.href='../dashboard/dashboard.html'">← Back to Shop</button><p class="category-label" style="margin-top:20px">Viewing</p><button class="cat-link active">@${currentProfile.username || 'Profile'}</button><button class="cat-link" onclick="location.href='../dashboard/dashboard.html'">Browse Catalog</button>`
        }
    }

    const addItem = document.querySelector('.story-item.add-story')
    if (addItem) addItem.style.display = isOwner ? 'flex' : 'none'

    if (isOwner) {
        try { const legacy = JSON.parse(localStorage.getItem('suotStories') || '[]'); for (const s of legacy) { if (s.img) await dbSaveStory({ imageUrl: s.img, label: s.label || '' }) } localStorage.removeItem('suotStories') } catch(e) {}
    }

    loadStories(currentProfile.id, isOwner)
    renderGrid()

    document.getElementById('profileLoader').style.display    = 'none'
    document.getElementById('storiesContainer').style.display  = 'flex'
    document.getElementById('profileContentArea').style.display = 'flex'
}

// ══════════════════════════════════════════
//  RENDER HEADER
// ══════════════════════════════════════════
function renderHeader(isOwner = true, amFollowing = false) {
    const p = currentProfile
    const name   = p.display_name || p.username || 'Swapper'
    const bio    = p.bio || ''
    const posted = getPosted().length
    const avatar = p.avatar_url ? p.avatar_url : `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=EBE0E3&color=C994A7&size=150`

    document.getElementById('profileHeader').innerHTML = `
        <div class="profile-pic-section" id="profilePicSection">
            <img id="mainAvatar" src="${avatar}" alt="Profile">
            ${isOwner ? `<div class="avatar-upload-overlay"><span class="avatar-edit-icon" onclick="openEditModal(event)">✎</span></div>` : ''}
        </div>
        <div class="profile-info-section">
            <div class="username-row">
                <h2 id="userNameDisplay">${name}</h2>
                <div id="profileBadgeIcons" style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;"></div>
                ${isOwner ? `<button class="btn-edit-profile" onclick="openEditModal()">Edit Profile</button>` : `<button id="followBtn" class="btn-edit-profile ${amFollowing ? 'btn-following' : ''}">${amFollowing ? 'Following ✓' : 'Follow'}</button>`}
            </div>
            <div class="stats-row">
                <span><strong id="postCountDisplay">${posted}</strong> posts</span>
                <span id="followersStat" style="cursor:pointer"><strong>${p.followers_count || 0}</strong> followers</span>
                <span id="followingStat" style="cursor:pointer"><strong>${p.following_count || 0}</strong> following</span>
            </div>
            <div class="bio-row">
                <p class="bio-text" id="bioDisplay">${bio.replace(/\n/g,'<br>') || '<span style="color:#ccc;font-style:italic;">No bio yet</span>'}</p>
            </div>
        </div>`

    document.getElementById('profilePicSection').addEventListener('click', e => { if (e.target.closest('.avatar-edit-icon')) return; if (stories.length) openStoryViewer(0) })
    const fStat = document.getElementById('followersStat'); if (fStat) fStat.addEventListener('click', () => openFollowersModal(p.id))
    const gStat = document.getElementById('followingStat'); if (gStat) gStat.addEventListener('click', () => openFollowingModal(p.id))

    if (!isOwner) {
        const btn = document.getElementById('followBtn')
        btn.addEventListener('click', async () => {
            btn.disabled = true; btn.textContent = '...'
            if (amFollowing) {
                const { error } = await supabase.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', p.id)
                if (!error) {
                    amFollowing = false; p.followers_count = Math.max(0, (p.followers_count || 0) - 1)
                    await supabase.from('profiles').update({ followers_count: p.followers_count }).eq('id', p.id)
                    const { data: myP } = await supabase.from('profiles').select('following_count').eq('id', currentUser.id).single()
                    if (myP) await supabase.from('profiles').update({ following_count: Math.max(0, (myP.following_count || 0) - 1) }).eq('id', currentUser.id)
                }
            } else {
                const { error } = await supabase.from('follows').insert({ follower_id: currentUser.id, following_id: p.id })
                if (!error) {
                    amFollowing = true; p.followers_count = (p.followers_count || 0) + 1
                    await supabase.from('profiles').update({ followers_count: p.followers_count }).eq('id', p.id)
                    const { data: myP } = await supabase.from('profiles').select('following_count').eq('id', currentUser.id).single()
                    if (myP) await supabase.from('profiles').update({ following_count: (myP.following_count || 0) + 1 }).eq('id', currentUser.id)
                }
            }
            btn.textContent = amFollowing ? 'Following ✓' : 'Follow'
            btn.className   = `btn-edit-profile ${amFollowing ? 'btn-following' : ''}`
            document.querySelector('#followersStat strong').textContent = p.followers_count || 0
            btn.disabled = false
        })
    }
}

window.saveProfile = async function() {
    const btn = document.getElementById('editSaveBtn'), status = document.getElementById('editSaveStatus')
    const username = document.getElementById('editUsername').value.trim()
    const dispName = document.getElementById('editDisplayName').value.trim()
    const bio      = document.getElementById('editBio').value.trim()
    if (!username)                          { status.style.color='#c0392b'; status.textContent='Username is required.'; return }
    if (username.length < 3)               { status.style.color='#c0392b'; status.textContent='Username must be at least 3 characters.'; return }
    if (!/^[a-zA-Z0-9_]+$/.test(username)) { status.style.color='#c0392b'; status.textContent='Username can only contain letters, numbers, and underscores.'; return }
    btn.disabled = true; btn.textContent = 'Saving…'
    const updates = { username, display_name: dispName, bio }
    const file = document.getElementById('avatarFileInput').files[0]
    if (file) {
        try {
            const ext = file.name.split('.').pop(), path = `avatars/${currentUser.id}.${ext}`
            const { error: upErr } = await supabase.storage.from('avatars').upload(path, file, { upsert: true }); if (upErr) throw upErr
            const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(path); updates.avatar_url = publicUrl
        } catch(e) { status.style.color='#c0392b'; status.textContent='Failed to upload photo: '+(e.message||'Unknown error'); btn.disabled=false; btn.textContent='Save Changes'; return }
    }
    const { error } = await supabase.from('profiles').update(updates).eq('id', currentUser.id)
    btn.disabled = false; btn.textContent = 'Save Changes'
    if (error) { status.style.color='#c0392b'; status.textContent=error.message.includes('unique')?'That username is already taken.':error.message; return }
    currentProfile = { ...currentProfile, ...updates }
    document.getElementById('avatarFileInput').value = ''
    renderHeader(true, false); closeEditModal(); showToast('Profile updated! ✦')
}

async function renderBadgesTab() {
    const grid = document.getElementById('profileGrid')
    grid.style.display = 'block'

            return
        }

function badgeCardHtml(r, isOwner) {
    function renderBadgeIcon(icon) {
    if (!icon) return '<span style="font-size:38px;line-height:1;">🏅</span>'
    if (icon.startsWith('http') || icon.startsWith('/') || icon.startsWith('data:')) {
        return `<img src="${icon}" style="width:56px;height:56px;border-radius:14px;object-fit:cover;border:1.5px solid #ede8ea;">`
    }
    return `<span style="font-size:38px;line-height:1;">${icon}</span>`
}
    const { badge, progress, earned, claimed } = r
    const pct = Math.min(100, Math.round((progress / badge.threshold) * 100))
    const criteriaLabels = { swaps_completed:'Swaps', items_posted:'Items Posted', items_wishlisted:'Wishlisted', followers:'Followers' }
    const unit = criteriaLabels[badge.criteria_type] || badge.criteria_type

    const progressHtml = `<div class="badge-progress-wrap">
        <div class="badge-progress-bar"><div class="badge-progress-fill ${earned ? 'complete' : ''}" style="width:${pct}%;"></div></div>
        <div class="badge-progress-label">${progress} / ${badge.threshold} ${unit}</div>
    </div>`

    let actionHtml = ''
    if (claimed)                    actionHtml = '<div class="badge-claimed-pill">✓ Claimed</div>'
    else if (earned && isOwner)     actionHtml = `<button class="badge-claim-btn" onclick="doClaim('${badge.id}', this)">🎉 Claim Badge</button>`
    else if (earned && !isOwner)    actionHtml = '<div class="badge-claimed-pill" style="background:#fff8ec;color:#d97706;">✓ Earned</div>'
    else                            actionHtml = '<div class="badge-locked-icon">🔒 Keep going!</div>'

    return `<div class="badge-card ${(earned || claimed) ? 'earned' : 'locked'}">
        ${(earned || claimed) ? '<div class="badge-earned-glow"></div>' : ''}
        <div class="badge-icon">${renderBadgeIcon(badge.icon)}</div>
        <div class="badge-name">${esc(badge.name)}</div>
        <div class="badge-desc">${esc(badge.description || '')}</div>
        ${progressHtml}
        ${actionHtml}
    </div>`
}

window.doClaim = async function(badgeId, btn) {
    btn.disabled = true; btn.textContent = 'Claiming…'
    try {
        const ok = await claimBadge(badgeId)
        if (ok) {
            const card = btn.closest('.badge-card')
            btn.replaceWith(Object.assign(document.createElement('div'), { className:'badge-claimed-pill', textContent:'✓ Claimed' }))
            card.classList.add('earned')
            showToast('🏅 Badge claimed!')
        } else {
            showToast('Could not claim badge. Try again.')
            btn.disabled = false; btn.textContent = '🎉 Claim Badge'
        }
    } catch(e) {
        showToast('Error claiming badge.')
        btn.disabled = false; btn.textContent = '🎉 Claim Badge'
    }
}

window.renderGrid = async function() {
    const grid = document.getElementById('profileGrid')
    // Reset grid to 3-col layout for non-badge tabs
    grid.style.display = ''
    grid.innerHTML = '<div class="pg-empty"><div class="loading-spin" style="width:24px;height:24px;border-width:3px;"></div></div>'

    if (activeTab === 'posted' && dbLoadedFor !== currentProfile?.id) {
        const { data, error } = await supabase.from('items').select('*').eq('user_id', currentProfile.id).eq('is_available', true).order('created_at', { ascending: false })
        if (!error) {
            dbPostedItems = (data || []).map(i => ({ id:i.id, name:i.name, category:i.category, brand:i.brand||'', desc:i.description||'', size:i.size||'', condition:i.condition||'', pts:i.pts||0, tags:i.tags||[], image:(i.images&&i.images[0])||null, images:i.images||[], postedAt:i.created_at }))
            dbLoadedFor = currentProfile.id
        }
    }

    const items = activeTab === 'posted' ? dbPostedItems : tabItems()
    const likes = getLikes()
    updatePostCount(items.length)
    grid.innerHTML = ''

    if (items.length === 0) {
        const isOwner = currentUser && currentProfile && currentUser.id === currentProfile.id
        const cfg = {
            posted: { i:'👗', h: isOwner ? 'No items posted yet' : 'No items listed', p: isOwner ? 'Head to "Post an Item" and list your first piece.' : 'This user hasn\'t posted anything yet.', b: isOwner ? '+ Post an Item' : null, url:'../personal/post-item.html' },
            saved:  { i:'🌟', h:'No saved items yet', p:'Browse the catalog and save items you love.', b:'Browse Catalog', url:'../dashboard/dashboard.html' },
            tagged: { i:'🏷️', h:'No tagged items yet', p:'Items others tag you in will appear here.', b: null }
        }
        const c = cfg[activeTab] || cfg.tagged
        grid.innerHTML = `<div class="pg-empty"><div class="pg-empty-icon">${c.i}</div><h3>${c.h}</h3><p>${c.p}</p>${c.b ? `<button class="pg-empty-btn" onclick="location.href='${c.url}'">${c.b}</button>` : ''}</div>`
        return
    }

    items.forEach((item, idx) => {
        const likeCount = likes[item.id] || 0
        const cmtCount  = cmtCountCache[item.id] ?? (getCmts()[item.id] || []).length
        const card = document.createElement('div'); card.className = 'pg-card'
        card.innerHTML = `<img src="${item.image || FALLBACK}" alt="${item.name}" loading="lazy"/><div class="pg-card-hover"><div class="pg-hover-stat"><svg viewBox="0 0 24 24" fill="#fff" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>${likeCount}</div><div class="pg-hover-stat"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>${cmtCount}</div></div>`
        card.onclick = () => openLb(idx)
        grid.appendChild(card)
    })
}

async function renderCmts(item) {
    const p = currentProfile, ownerName = p.display_name || p.username || 'Swapper'
    const ownerAvatar = p.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(ownerName)}&background=EBE0E3&color=C994A7&size=60`
    const list = document.getElementById('lbCmtList')
    list.innerHTML = '<div style="padding:10px 0;text-align:center;"><div class="loading-spin" style="width:16px;height:16px;border-width:2px;margin:0 auto;"></div></div>'
    let allCmts = [], likesData = { counts: {}, likedByMe: new Set() }
    try { [allCmts, likesData] = await Promise.all([fetchComments(item.id), fetchCommentLikes(item.id)]); cmtCountCache[item.id] = allCmts.filter(c => !c.parent_comment_id).length } catch(e) { console.error('renderCmts failed:', e) }
    list.innerHTML = ''
    if (item.desc) list.innerHTML += cmtHtml(ownerAvatar, ownerName, item.desc, item.postedAt, null, false, false, 0, currentProfile.id)
    const topLevel = allCmts.filter(c => !c.parent_comment_id), repliesMap = {}
    allCmts.filter(c => c.parent_comment_id).forEach(r => { if (!repliesMap[r.parent_comment_id]) repliesMap[r.parent_comment_id] = []; repliesMap[r.parent_comment_id].push(r) })
    if (topLevel.length === 0 && !item.desc) { list.innerHTML = '<div class="lb-no-cmt">No comments yet. Be the first!</div>'; return }
    topLevel.forEach(c => {
        const prof = c.profiles || {}, cName = prof.display_name || prof.username || 'Swapper'
        const cAvatar = prof.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(cName)}&background=EBE0E3&color=C994A7&size=60`
        list.innerHTML += cmtHtml(cAvatar, cName, c.text, c.created_at, c.id, true, likesData.likedByMe.has(c.id), likesData.counts[c.id]||0, c.profiles?.id)
        const replies = repliesMap[c.id] || []
        if (replies.length) {
            const rw = document.createElement('div'); rw.className = 'lb-replies-list'; rw.id = `replies-${c.id}`
            replies.forEach(r => { const rp = r.profiles||{}, rName = rp.display_name||rp.username||'Swapper', rAv = rp.avatar_url||`https://ui-avatars.com/api/?name=${encodeURIComponent(rName)}&background=EBE0E3&color=C994A7&size=40`; rw.innerHTML += replyHtml(rAv, rName, r.text, r.created_at, r.id, c.id, likesData.likedByMe.has(r.id), likesData.counts[r.id]||0, r.profiles?.id) })
            const lastRow = list.querySelector(`[data-cmt-id="${c.id}"]`); if (lastRow) lastRow.after(rw)
        }
    })
    list.scrollTop = list.scrollHeight
}

function cmtHtml(avatar, user, text, ts, cmtId, showActions, isLiked, likeCount, authorId) {
    const actionsHtml = showActions && cmtId ? `<div class="lb-cmt-actions"><button class="lb-cmt-like-btn ${isLiked?'liked':''}" onclick="handleCmtLike('${cmtId}',this)"><svg viewBox="0 0 24 24" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>${likeCount>0?`<span class="lb-cmt-likes-count">${likeCount}</span>`:''}</button><button class="lb-cmt-reply-btn" onclick="openReplyForm('${cmtId}','')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Reply</button></div><div class="lb-reply-form" id="reply-form-${cmtId}"><input class="lb-reply-input" type="text" placeholder="Reply to ${esc(user)}…" oninput="this.nextElementSibling.classList.toggle('ready',this.value.trim().length>0)" onkeydown="if(event.key==='Enter')submitReply('${cmtId}',this)"/><button class="lb-reply-post" onclick="submitReply('${cmtId}',this.previousElementSibling)">Post</button></div>` : ''
    return `<div class="lb-comment-row" data-cmt-id="${cmtId||''}" data-author-id="${authorId||''}"><div class="lb-cmt-avatar"><img src="${avatar}" alt=""/></div><div class="lb-cmt-body"><strong>${esc(user)}</strong> ${esc(text)}<span class="lb-cmt-time">${timeAgo(ts)}</span>${actionsHtml}</div></div>`
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function replyHtml(avatar, user, text, ts, replyId, rootCommentId, isLiked, likeCount, authorId) {
    return `<div class="lb-reply-row" data-reply-id="${replyId}" data-author-id="${authorId||''}"><div class="lb-reply-avatar"><img src="${avatar}" alt=""/></div><div class="lb-reply-body"><strong>${esc(user)}</strong> ${esc(text)}<span class="lb-reply-time">${timeAgo(ts)}</span><div class="lb-cmt-actions"><button class="lb-cmt-like-btn ${isLiked?'liked':''}" onclick="handleCmtLike('${replyId}',this)"><svg viewBox="0 0 24 24" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>${likeCount>0?`<span class="lb-cmt-likes-count">${likeCount}</span>`:''}</button><button class="lb-cmt-reply-btn" onclick="openReplyForm('${rootCommentId}','${esc(user)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Reply</button></div></div></div>`
}

window.toggleLike = function() {
    if (!lbId) return
    const likes=getLikes(), arr=likes['__liked__']||[], id=String(lbId), had=arr.includes(id)
    likes[id]=Math.max(0,(likes[id]||0)+(had?-1:1)); likes['__liked__']=had?arr.filter(x=>x!==id):[...arr,id]; setLikes(likes)
    const count=likes[id]; document.getElementById('lbLikeCount').textContent=count===1?'1 like':`${count} likes`
    const btn=document.getElementById('lbHeartBtn'); btn.classList.toggle('liked',!had); btn.querySelector('svg').style.fill=!had?'#ed4956':'none'; btn.querySelector('svg').style.color=!had?'#ed4956':'#bbb'
    renderGrid()
    if (!had && currentProfile && myProfile && currentProfile.id !== myProfile.id) {
        const item = tabItems()[lbIdx], senderName = myProfile.display_name || myProfile.username || 'Someone'
        createNotification({ userId: currentProfile.id, type:'like', message:`<strong>${senderName}</strong> liked your item "${item?.name||''}"`, link:`../personal/item-detail.html?id=${lbId}`, thumbnailUrl: item?.image||null }).catch(()=>{})
    }
}

window.postComment = async function() {
    const input = document.getElementById('lbCmtInput'), text = input.value.trim(); if (!text || !lbId) return
    input.value = ''; const postBtn = document.getElementById('lbCmtPost'); postBtn.classList.remove('ready'); postBtn.disabled = true
    try {
        const saved = await addComment({ itemId: lbId, text }); cmtCountCache[lbId] = (cmtCountCache[lbId]||0)+1
        const prof = saved.profiles||{}, cName = prof.display_name||prof.username||'Swapper'
        const cAvatar = prof.avatar_url||`https://ui-avatars.com/api/?name=${encodeURIComponent(cName)}&background=EBE0E3&color=C994A7&size=60`
        const list = document.getElementById('lbCmtList'); const placeholder = list.querySelector('.lb-no-cmt'); if (placeholder) placeholder.remove()
        list.innerHTML += cmtHtml(cAvatar, cName, saved.text, saved.created_at, saved.id, true, false, 0, saved.profiles?.id); list.scrollTop = list.scrollHeight
        if (currentProfile && myProfile && currentProfile.id !== myProfile.id) {
            const item = tabItems()[lbIdx], senderName = myProfile.display_name||myProfile.username||'Someone'
            createNotification({ userId:currentProfile.id, type:'comment', message:`<strong>${senderName}</strong> commented on your item "${item?.name||''}"`, link:`../personal/item-detail.html?id=${lbId}`, thumbnailUrl:item?.image||null }).catch(()=>{})
        }
        renderGrid()
    } catch(e) { console.error('postComment failed:', e); showToast('Could not post comment. Try again.', 'error'); input.value = text; postBtn.classList.add('ready') }
    finally { postBtn.disabled = false }
}

window.handleCmtLike = async function(commentId, btn) {
    btn.disabled = true
    try {
        const nowLiked = await toggleCommentLike(commentId); btn.classList.toggle('liked', nowLiked); btn.querySelector('svg').setAttribute('fill', nowLiked ? 'currentColor' : 'none')
        let countEl = btn.querySelector('.lb-cmt-likes-count'); const prev = parseInt(countEl?.textContent||'0')||0, newCount = nowLiked ? prev+1 : Math.max(0,prev-1)
        if (newCount > 0) { if (!countEl) { countEl = document.createElement('span'); countEl.className='lb-cmt-likes-count'; btn.appendChild(countEl) } countEl.textContent = newCount } else if (countEl) countEl.remove()
        if (nowLiked && myProfile) { const row = btn.closest('[data-author-id]'), authorId = row?.dataset.authorId; if (authorId && authorId !== myProfile.id) createNotification({ userId:authorId, type:'like', message:`<strong>${myProfile.display_name||myProfile.username||'Someone'}</strong> liked your comment` }).catch(()=>{}) }
    } catch(e) { console.error('handleCmtLike failed:', e) }
    btn.disabled = false
}

window.openReplyForm = function(rootCommentId, mentionUser) {
    document.querySelectorAll('.lb-reply-form.open').forEach(f => f.classList.remove('open'))
    const form = document.getElementById(`reply-form-${rootCommentId}`); if (!form) return
    form.classList.add('open'); const input = form.querySelector('.lb-reply-input'); if (input) { if (mentionUser) { input.value=`@${mentionUser} `; input.nextElementSibling?.classList.add('ready') } else { input.value=''; input.nextElementSibling?.classList.remove('ready') } input.focus(); const len=input.value.length; input.setSelectionRange(len,len) }
}

window.submitReply = async function(parentCommentId, inputEl) {
    const text = inputEl.value.trim(); if (!text || !lbId) return; inputEl.disabled = true
    try {
        const saved = await addReply({ itemId: lbId, parentCommentId, text }); const prof = saved.profiles||{}, rName = prof.display_name||prof.username||'Swapper'
        const rAvatar = prof.avatar_url||`https://ui-avatars.com/api/?name=${encodeURIComponent(rName)}&background=EBE0E3&color=C994A7&size=40`
        let rw = document.getElementById(`replies-${parentCommentId}`)
        if (!rw) { rw=document.createElement('div'); rw.className='lb-replies-list'; rw.id=`replies-${parentCommentId}`; const form=document.getElementById(`reply-form-${parentCommentId}`); if (form) form.after(rw) }
        const tempDiv = document.createElement('div'); tempDiv.innerHTML = replyHtml(rAvatar, rName, saved.text, saved.created_at, saved.id, parentCommentId, false, 0, saved.profiles?.id); rw.appendChild(tempDiv.firstElementChild)
        inputEl.value=''; inputEl.nextElementSibling?.classList.remove('ready'); document.getElementById(`reply-form-${parentCommentId}`)?.classList.remove('open'); document.getElementById('lbCmtList').scrollTop = document.getElementById('lbCmtList').scrollHeight
        if (myProfile) { const parentRow = document.querySelector(`.lb-comment-row[data-cmt-id="${parentCommentId}"]`), parentAuthorId = parentRow?.dataset.authorId; if (parentAuthorId && parentAuthorId !== myProfile.id) createNotification({ userId:parentAuthorId, type:'reply', message:`<strong>${myProfile.display_name||myProfile.username||'Someone'}</strong> replied to your comment` }).catch(()=>{}) }
    } catch(e) { console.error('submitReply failed:', e); showToast('Could not post reply. Try again.', 'error') }
    inputEl.disabled = false
}

window.toggleStoryMenu = function(e) { e.stopPropagation(); document.getElementById('storyDotsMenu').classList.toggle('open') }
window.deleteCurrentStory = async function() {
    const s = stories[curStory]; if (!s || !s.id) return; if (!confirm('Delete this story?')) return
    document.getElementById('storyDotsMenu').classList.remove('open')
    try { await deleteStory(s.id); stories.splice(curStory, 1); renderStories(); refreshRing(); if (stories.length === 0) { closeStoryViewer() } else { curStory = Math.min(curStory, stories.length-1); showStory(curStory) } showToast('Story deleted.') } catch(e) { showToast('Could not delete story. Try again.', 'error') }
}
window.sendStoryReply = function(e) {
    e.stopPropagation(); const input = document.getElementById('storyReplyInput'), text = input.value.trim(); if (!text) return
    supabase.from('messages').insert({ from_user_id:currentUser.id, to_user_id:currentProfile.id, body:`Replied to your story "${stories[curStory]?.label||'story'}": ${text}` }).then(({ error }) => { if (error) { showToast('Could not send reply.', 'error'); return } input.value=''; input.parentElement.querySelector('.story-reply-send').style.opacity='.4'; showToast('Reply sent!') })
}

window.toggleSave = function() {
    if(!lbId) return; const items=tabItems(), item=items[lbIdx]; let wl=getWL(); const i=wl.findIndex(w=>String(w.id)===String(lbId))
    if(i===-1){wl.unshift({id:item.id,name:item.name,category:item.category,pts:item.pts,image:item.image||'',condition:item.condition||'',size:item.size||'',brand:item.brand||'',swapper:{},savedAt:new Date().toISOString()});showToast('★ Saved!')} else{wl.splice(i,1);showToast('Removed from wishlist.')}
    setWL(wl); const isSaved=wl.some(w=>String(w.id)===String(lbId)), btn=document.getElementById('lbSaveBtn'); btn.classList.toggle('saved',isSaved); btn.querySelector('svg').style.fill=isSaved?'#4A635D':'none'; btn.querySelector('svg').style.color=isSaved?'#4A635D':'#bbb'
}
window.goSwap    = function() { if(lbId) location.href=`../personal/item-detail.html?id=${lbId}` }
window.deleteItem = async function() {
    if(!confirm('Delete this item?')) return
    await supabase.from('items').delete().eq('id', lbId).eq('user_id', currentUser.id)
    dbPostedItems = dbPostedItems.filter(i => String(i.id) !== String(lbId)); setPosted(getPosted().filter(i=>String(i.id)!==String(lbId)))
    let col=JSON.parse(localStorage.getItem(`suotCollection_${__suot_uid}`)||'[]').filter(c=>c.id!=='p'+lbId); localStorage.setItem(`suotCollection_${__suot_uid}`,JSON.stringify(col))
    setWL(getWL().filter(w=>String(w.id)!==String(lbId))); closeLb(); renderGrid(); showToast('Item deleted.')

window.openEdit = function() {
    const item=getPosted().find(i=>String(i.id)===String(lbId)); if(!item) return
    document.getElementById('efName').value=item.name||''; document.getElementById('efBrand').value=item.brand||''; document.getElementById('efDesc').value=item.desc||''; document.getElementById('efPrice').value=item.pts||500

window.efSz = function(btn) { document.querySelectorAll('.ef-sz').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected') }

// ══════════════════════════════════════════
//  STORIES
// ══════════════════════════════════════════
async function loadStories(userId, isOwner = false) {
    if (isOwner) { try { await pruneExpiredStories(userId) } catch(_) {} }
    try { const db = await fetchStories(userId); stories = (db||[]).map(s => ({ img:s.image_url, label:s.label||'', ts:s.created_at?new Date(s.created_at).getTime():Date.now(), id:s.id, viewedByOwner:false })); stories = stories.filter(s => Date.now()-s.ts < STORY_EXPIRY) } catch(e) { console.error('loadStories failed', e); stories = [] }
    renderStories(); refreshRing()
    if (window.__storyExpiryInterval) clearInterval(window.__storyExpiryInterval)
    window.__storyExpiryInterval = setInterval(async () => { const before=stories.length; stories=stories.filter(s=>Date.now()-s.ts<STORY_EXPIRY); if(stories.length!==before){renderStories();refreshRing();if(isOwner){try{await pruneExpiredStories(userId)}catch(_){}}}} , 60_000)
}

function refreshRing() { const el=document.querySelector('.profile-pic-section'); if(!el) return; el.classList.remove('ring-active','ring-viewed'); if(!stories.length) return; el.classList.add(stories.some(s=>!s.viewedByOwner)?'ring-active':'ring-viewed') }
function renderStories() {
    const c=document.getElementById('storiesContainer'); c.querySelectorAll('.story-item:not(.add-story)').forEach(e=>e.remove())
    stories.forEach((s,i) => { const d=document.createElement('div'); d.className='story-item'; d.innerHTML=`<div class="story-circle ${s.viewedByOwner?'ring-viewed':'ring-active'}"><img src="${s.img}" alt="${s.label}"></div><span>${s.label}</span>`; d.onclick=()=>openStoryViewer(i); c.appendChild(d) })
}

window.openAddStoryModal = function() { document.getElementById('storyPreviewWrap').style.display='none'; document.getElementById('storyUploadPrompt').style.display='block'; document.getElementById('storyPreviewImg').src=''; document.getElementById('storyLabel').value=''; document.getElementById('storyFileInput').value=''; document.getElementById('addStoryModal').style.display='flex' }
window.closeAddStoryModal = function() { document.getElementById('addStoryModal').style.display = 'none' }
window.postStory = async function() {
    const fileInput=document.getElementById('storyFileInput'), file=fileInput.files[0]; if(!file){showToast('Please choose a photo first.','error');return}
    const label=document.getElementById('storyLabel').value.trim()||'My Story', postBtn=document.querySelector('#addStoryModal .btn-save')
    if(postBtn){postBtn.disabled=true;postBtn.textContent='Posting…'}
    try {
        const ext=file.name.split('.').pop(), path=`stories/${currentProfile.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`
        const{error:upErr}=await supabase.storage.from('stories').upload(path,file,{upsert:true}); if(upErr) throw upErr
        const{data:{publicUrl}}=supabase.storage.from('stories').getPublicUrl(path)
        const newStory=await dbSaveStory({imageUrl:publicUrl,label})
        stories.unshift({img:newStory.image_url,label:newStory.label||'',ts:newStory.created_at?new Date(newStory.created_at).getTime():Date.now(),id:newStory.id,viewedByOwner:false})
        renderStories(); refreshRing(); closeAddStoryModal(); showToast('Story posted!')
    } catch(e) { console.error('story upload failed',e); showToast(`Could not post story: ${e?.message||'unknown error'}`,'error'); if(postBtn){postBtn.disabled=false;postBtn.textContent='Post Story'} }
}

function openStoryViewer(i) { curStory=i; document.getElementById('storyViewer').style.display='flex'; document.body.style.overflow='hidden'; showStory(i) }
window.closeStoryViewer = function() { clearInterval(storyTimer); document.getElementById('storyViewer').style.display='none'; document.body.style.overflow='' }
function showStory(i) {
    clearInterval(storyTimer); const s=stories[i]; if(!s){closeStoryViewer();return}
    const p=currentProfile, name=p.display_name||p.username||'Swapper', av=p.avatar_url||`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=EBE0E3&color=C994A7&size=150`
    const isOwner=currentUser&&currentProfile&&currentUser.id===currentProfile.id
    document.getElementById('storyViewerImg').src=s.img; document.getElementById('viewerAvatar').src=av; document.getElementById('viewerUsername').innerText=name; document.getElementById('viewerLabel').innerText=s.label
    const dotsWrap=document.getElementById('storyDotsWrap'); if(dotsWrap) dotsWrap.style.display=isOwner?'block':'none'; document.getElementById('storyDotsMenu')?.classList.remove('open')
    const replyBar=document.getElementById('storyReplyBar'), viewersPanel=document.getElementById('storyViewersPanel')
    if(isOwner){if(replyBar)replyBar.style.display='none';if(viewersPanel)viewersPanel.style.display='flex';if(s.id){document.getElementById('storyViewersList').innerHTML='<div class="story-no-viewers"><div class="loading-spin" style="width:14px;height:14px;border-width:2px;margin:0 auto;border-color:rgba(255,255,255,.2);border-top-color:rgba(255,255,255,.6);"></div></div>';fetchStoryViewers(s.id).then(viewers=>{const el=document.getElementById('storyViewersList');if(!el)return;if(!viewers.length){el.innerHTML='<div class="story-no-viewers">No views yet</div>';return}el.innerHTML=viewers.map(v=>{const vName=v.display_name||v.username||'User',vAv=v.avatar_url||`https://ui-avatars.com/api/?name=${encodeURIComponent(vName)}&background=4A635D&color=fff&size=60`;return`<div class="story-viewer-row"><div class="story-viewer-av"><img src="${vAv}" alt=""/></div><div><div class="story-viewer-name">${esc(vName)}</div><div class="story-viewer-time">${timeAgo(v.viewed_at)}</div></div></div>`}).join('')}).catch(()=>{})}} else{if(replyBar)replyBar.style.display='';if(viewersPanel)viewersPanel.style.display='none';if(s.id)recordStoryView(s.id).catch(()=>{})}
    if(!s.viewedByOwner){stories[i].viewedByOwner=true;renderStories();refreshRing()}
    const w=document.getElementById('storyProgressBars');w.innerHTML=''
    stories.forEach((_,j)=>{const b=document.createElement('div');b.className='sp-bar';const f=document.createElement('div');f.className='sp-fill';if(j<i)f.style.width='100%';b.appendChild(f);w.appendChild(b)})
    const fill=document.querySelectorAll('.sp-fill')[i];if(!fill)return
    let elapsed=0;fill.style.width='0%';storyTimer=setInterval(()=>{elapsed+=50;fill.style.width=Math.min((elapsed/STORY_DUR)*100,100)+'%';if(elapsed>=STORY_DUR)nextStory()},50)
}
window.nextStory=function(){curStory<stories.length-1?showStory(++curStory):closeStoryViewer()}
window.prevStory=function(){curStory>0?showStory(--curStory):null}

document.getElementById('storyFileInput').addEventListener('change',function(){if(!this.files[0])return;const r=new FileReader();r.onload=e=>{document.getElementById('storyPreviewImg').src=e.target.result;document.getElementById('storyPreviewWrap').style.display='block';document.getElementById('storyUploadPrompt').style.display='none'};r.readAsDataURL(this.files[0])})

// ══════════════════════════════════════════
//  KEYBOARD + BACKDROP CLOSES
// ══════════════════════════════════════════
document.getElementById('lbOverlay').addEventListener('click', e => { if(e.target===document.getElementById('lbOverlay'))closeLb() })
document.getElementById('storyViewer').addEventListener('click', e => { document.getElementById('storyDotsMenu')?.classList.remove('open'); if(e.target===document.getElementById('storyViewer'))closeStoryViewer() })
;['editModal','addStoryModal'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.style.display='none'})})
document.addEventListener('keydown', e => {
    if(e.key==='Escape'){closeLb();closeStoryViewer();closeEditModal();closeAddStoryModal()}
    const lbOpen=document.getElementById('lbOverlay').classList.contains('open')
    if(e.key==='ArrowRight'){lbOpen?lbNav(1):nextStory()}
    if(e.key==='ArrowLeft'){lbOpen?lbNav(-1):prevStory()}
})

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function timeAgo(iso) {
    if(!iso)return''; const d=Date.now()-new Date(iso).getTime(),m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000)
    if(m<1)return'just now'; if(m<60)return m+'m ago'; if(h<24)return h+'h ago'; if(dy<7)return dy+'d ago'
    return new Date(iso).toLocaleDateString('en-PH',{month:'short',day:'numeric'})
}
function showToast(msg, type='success') {
    const t=document.createElement('div'); t.className=`toast toast-${type}`; t.innerText=msg; document.body.appendChild(t)
    setTimeout(()=>t.classList.add('toast-show'),10); setTimeout(()=>{t.classList.remove('toast-show');setTimeout(()=>t.remove(),400)},3000)
}

// ── BADGE ICONS NEXT TO NAME ──────────────────────────────────
async function loadProfileBadgeIcons() {
    const container = document.getElementById('profileBadgeIcons')
    if (!container) return
    try {
        const results = await fetchUserBadgeProgress(currentProfile.id)
        const claimed = results.filter(r => r.claimed)
        if (!claimed.length) { container.innerHTML = ''; return }
        container.innerHTML = claimed.map(r => {
    const icon = r.badge.icon || '🏅'
    const isUrl = icon.startsWith('http') || icon.startsWith('/') || icon.startsWith('data:')
    return isUrl
        ? `<img src="${icon}" title="${r.badge.name}" style="width:22px;height:22px;border-radius:6px;object-fit:cover;cursor:default;transition:transform .2s;" onmouseover="this.style.transform='scale(1.35)'" onmouseout="this.style.transform='scale(1)'">`
        : `<span title="${r.badge.name}" style="font-size:18px;line-height:1;cursor:default;display:inline-block;transition:transform .2s;" onmouseover="this.style.transform='scale(1.35)'" onmouseout="this.style.transform='scale(1)'">${icon}</span>`
}).join('')
    } catch(e) { console.error('loadProfileBadgeIcons:', e) }
}

setTimeout(() => { const loader=document.getElementById('profileLoader'); if(loader&&loader.style.display!=='none'){loader.style.display='none';console.warn('Profile loader timeout — force hidden')} }, 15000)
