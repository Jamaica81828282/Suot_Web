<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suot | Friends</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../dashboard/dashboard.css"/>
  <style>
    /* ── sidebar scroll fix ── */
    .side-nav {
        display: flex !important;
        flex-direction: column !important;
        height: 100vh !important;
        overflow: hidden !important;
    }
    .category-list {
        flex: 1 1 0 !important;
        min-height: 0 !important;
        overflow-y: auto !important;
    }
    .category-list::-webkit-scrollbar { width: 3px; }
    .category-list::-webkit-scrollbar-thumb { background: #eee; border-radius: 3px; }

    :root{
      --rose:#C994A7;--rose-light:#f0dfe5;--rose-pale:#faf4f6;
      --forest:#4A635D;--forest-dark:#37504A;--blush:#EBE0E3;
      --border:#ede8ea;--bg:#FDFBFC;--white:#fff;--muted:#9a9a9a;--text:#1a1a1a;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"DM Sans",sans-serif;background:var(--bg);height:100vh;overflow:hidden;}
    .side-nav .cat-link{display:flex;align-items:center;gap:9px;width:100%;}
    .side-nav .cat-link svg{width:15px!important;height:15px!important;min-width:15px;flex-shrink:0;opacity:.7;}
    .side-nav .cat-link.active svg,.side-nav .cat-link:hover svg{opacity:1;}
    .main-content{padding:0!important;overflow:hidden!important;}

    /* FULL HEIGHT TWO-COLUMN */
    .fr-layout{display:grid;grid-template-columns:320px 1fr;height:100vh;overflow:hidden;}

    /* LEFT: dark forest panel */
    .fr-left{
      background:linear-gradient(170deg,var(--forest) 0%,#2e4440 100%);
      display:flex;flex-direction:column;overflow:hidden;position:relative;
    }
    .fr-left::after{
      content:"";position:absolute;bottom:0;left:0;right:0;height:180px;
      background:linear-gradient(to top,rgba(0,0,0,.15),transparent);pointer-events:none;
    }

    .fr-hero{padding:30px 26px 22px;flex-shrink:0;}
    .fr-eyebrow{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:rgba(255,255,255,.4);margin-bottom:10px;}
    .fr-title{font-family:"Playfair Display",serif;font-size:2rem;font-weight:700;color:#fff;line-height:1.15;margin-bottom:6px;}
    .fr-sub{font-size:12.5px;color:rgba(255,255,255,.5);line-height:1.65;}

    /* STATS */
    .fr-stats{display:grid;grid-template-columns:repeat(3,1fr);margin:0 18px;border-radius:14px;overflow:hidden;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);flex-shrink:0;}
    .fr-stat{padding:14px 8px;text-align:center;cursor:pointer;transition:background .2s;position:relative;}
    .fr-stat:not(:last-child)::after{content:"";position:absolute;right:0;top:20%;bottom:20%;width:1px;background:rgba(255,255,255,.1);}
    .fr-stat:hover{background:rgba(255,255,255,.08);}
    .fr-stat.active{background:rgba(255,255,255,.13);}
    .fr-stat-n{font-size:1.5rem;font-weight:800;color:#fff;line-height:1;}
    .fr-stat-l{font-size:9.5px;color:rgba(255,255,255,.45);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;}

    /* NAV TABS */
    .fr-tabs{display:flex;flex-direction:column;gap:2px;padding:18px 14px 0;flex-shrink:0;}
    .fr-tab{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:11px;cursor:pointer;border:none;background:transparent;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,.5);transition:all .2s;text-align:left;width:100%;}
    .fr-tab:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);}
    .fr-tab.active{background:rgba(255,255,255,.13);color:#fff;}
    .fr-tab-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
    .fr-tab-label{flex:1;}
    .fr-tab-badge{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:9.5px;font-weight:800;min-width:18px;height:18px;border-radius:50px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;}
    .fr-tab.active .fr-tab-badge{background:var(--rose);color:#fff;}

    /* SEARCH in left */
    .fr-search-block{padding:14px 14px 18px;flex-shrink:0;margin-top:auto;}
    .fr-sw{position:relative;}
    .fr-sw svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:rgba(255,255,255,.35);pointer-events:none;}
    .fr-search{width:100%;padding:9px 13px 9px 34px;border:1.5px solid rgba(255,255,255,.12);border-radius:50px;font-family:"DM Sans",sans-serif;font-size:12.5px;color:#fff;background:rgba(255,255,255,.07);outline:none;transition:all .2s;}
    .fr-search::placeholder{color:rgba(255,255,255,.3);}
    .fr-search:focus{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.11);}

    /* RIGHT PANEL */
    .fr-right{display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--border);}
    .fr-right-hdr{
      padding:20px 26px 16px;border-bottom:1px solid var(--border);
      background:var(--white);flex-shrink:0;
    }
    .fr-right-title{font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:700;color:var(--text);}
    .fr-right-sub{font-size:12px;color:var(--muted);margin-top:2px;}

    /* SCROLL AREA */
    .fr-content{flex:1;overflow-y:auto;padding:16px 24px 24px;}
    .fr-content::-webkit-scrollbar{width:3px;}
    .fr-content::-webkit-scrollbar-thumb{background:var(--rose-light);border-radius:3px;}

    /* FIND */
    .find-box{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;}
    .find-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
    .find-row{display:flex;gap:8px;}
    .find-inp{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s;}
    .find-inp:focus{border-color:var(--rose);}
    .find-btn{padding:10px 18px;background:linear-gradient(135deg,var(--forest),var(--forest-dark));border:none;border-radius:12px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:.2s;}
    .find-btn:hover{opacity:.88;}

    /* PERSON CARD */
    .fr-grid{display:flex;flex-direction:column;gap:8px;}
    .person-card{display:flex;align-items:center;gap:12px;background:var(--white);border:1.5px solid var(--border);border-radius:15px;padding:12px 14px;transition:all .2s;animation:fadeUp .22s ease both;}
    .person-card:hover{border-color:var(--rose-light);box-shadow:0 4px 16px rgba(201,148,167,.11);transform:translateY(-1px);}
    .person-card.friend{border-color:#bbf7d0;background:#f0fdf4;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
    .pc-av{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--rose-light);flex-shrink:0;cursor:pointer;transition:all .2s;}
    .pc-av:hover{border-color:var(--rose);transform:scale(1.06);}
    .pc-info{flex:1;min-width:0;cursor:pointer;}
    .pc-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .pc-user{font-size:11px;color:var(--muted);margin-top:1px;}
    .pc-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
    .pc-badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:50px;}
    .pc-badge.friends{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0;}
    .pc-badge.following{background:var(--rose-pale);color:var(--rose);border:1px solid var(--rose-light);}
    .pc-badge.follower{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;}
    .pc-actions{display:flex;gap:6px;flex-shrink:0;}
    .btn-msg{width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer;transition:.2s;background:var(--white);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;}
    .btn-msg:hover{background:var(--rose-pale);border-color:var(--rose-light);}
    .btn-follow{padding:7px 15px;border-radius:50px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;border:none;white-space:nowrap;}
    .btn-follow.follow{background:linear-gradient(135deg,var(--forest),var(--forest-dark));color:#fff;}
    .btn-follow.follow:hover{opacity:.88;}
    .btn-follow.unfollow{background:var(--white);border:1.5px solid var(--border);color:var(--muted);}
    .btn-follow.unfollow:hover{border-color:#fecaca;color:#dc2626;background:#fef2f2;}
    .btn-follow:disabled{opacity:.4;cursor:not-allowed;}

    /* EMPTY */
    .fr-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;height:100%;min-height:300px;}
    .fr-empty-icon{font-size:2.8rem;}
    .fr-empty h4{font-size:.95rem;font-weight:700;color:var(--text);}
    .fr-empty p{font-size:.83rem;color:var(--muted);max-width:220px;line-height:1.6;}
    .fr-empty-btn{padding:9px 20px;background:linear-gradient(135deg,var(--forest),var(--forest-dark));border:none;border-radius:50px;font-family:"DM Sans",sans-serif;font-size:12.5px;font-weight:700;color:#fff;cursor:pointer;transition:.2s;}
    .fr-empty-btn:hover{opacity:.88;}

    .spin{width:18px;height:18px;border:2.5px solid var(--rose-light);border-top-color:var(--rose);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ldr{display:flex;align-items:center;justify-content:center;gap:10px;padding:50px;color:var(--muted);font-size:13px;}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--forest);color:#fff;padding:11px 22px;border-radius:50px;font-size:13px;font-weight:600;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;pointer-events:none;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .nav-badge{display:none;margin-left:auto;background:var(--rose);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:50px;align-items:center;justify-content:center;padding:0 5px;}
  </style>
</head>
<body class="dash-body">

<aside class="side-nav">

  </div>
  <div class="category-list">
    <p class="category-label">Browse Catalog</p>
    <button class="cat-link" onclick="location.href='../dashboard/dashboard.html'">

    <button class="cat-link" onclick="location.href='post-item.html'">

    <button class="cat-link" onclick="location.href='wishlist.html'">

  <button class="btn-logout" onclick="doLogout()">Logout</button>
</aside>

<main class="main-content">
  <div class="fr-layout">

    <!-- LEFT PANEL -->
    <div class="fr-left">
      <div class="fr-hero">
        <div class="fr-eyebrow">Community</div>
        <h1 class="fr-title">Friends &amp;<br/>Followers</h1>
        <p class="fr-sub">Follow swappers you love.<br/>When they follow back — you're friends.</p>
      </div>

      <div class="fr-stats">
        <div class="fr-stat active" id="stat-friends" onclick="switchTab('friends')">
          <div class="fr-stat-n" id="cnt-friends">0</div>
          <div class="fr-stat-l">Friends</div>
        </div>
        <div class="fr-stat" id="stat-followers" onclick="switchTab('followers')">
          <div class="fr-stat-n" id="cnt-followers">0</div>
          <div class="fr-stat-l">Followers</div>
        </div>
        <div class="fr-stat" id="stat-following" onclick="switchTab('following')">
          <div class="fr-stat-n" id="cnt-following">0</div>
          <div class="fr-stat-l">Following</div>
        </div>
      </div>

      <div class="fr-tabs" style="margin-top:18px;">
        <button class="fr-tab active" id="tab-friends" onclick="switchTab('friends')">

        </button>

    <!-- RIGHT PANEL -->

      </div>

  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { supabase } from '../db/supabase.js'

let me = null, myP = null
let following = new Set(), followers = new Set(), friends = new Set()
let followingData = [], followersData = []
let activeTab = 'friends'

const tabMeta = {
  friends:   { title: 'Friends',       sub: 'People who follow each other' },
  followers: { title: 'Followers',     sub: 'People who follow you' },
  following: { title: 'Following',     sub: 'People you follow' },
  find:      { title: '🔎 Find People', sub: 'Discover new swappers on Suot' }
}

// ====== BOOT ======
const { data: { session } } = await supabase.auth.getSession()
if (!session) { location.href = '../auth/login.html' }
me = session.user

const { data: p } = await supabase.from('profiles').select('*').eq('id', me.id).single()
myP = p || {}
document.getElementById('navName').textContent = myP.display_name || myP.username || 'You'
document.getElementById('navAv').src = myP.avatar_url || av(myP.display_name || 'U')

await loadAll()
updMsgBadge()

supabase.channel('follows-rt')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'follows' }, async () => { await loadAll() })
  .subscribe()

// ====== LOAD ALL ======
async function loadAll() {
  const [fwingRes, fwersRes] = await Promise.all([
    supabase.from('follows').select('following_id').eq('follower_id', me.id),
    supabase.from('follows').select('follower_id').eq('following_id', me.id)
  ])

  following = new Set((fwingRes.data || []).map(f => f.following_id))
  followers = new Set((fwersRes.data || []).map(f => f.follower_id))
  friends   = new Set([...following].filter(id => followers.has(id)))

  const allIds = [...new Set([...following, ...followers])]
  let profMap = {}
  if (allIds.length) {
    const { data: profs } = await supabase.from('profiles').select('id,username,display_name,avatar_url').in('id', allIds)
    profs?.forEach(pr => profMap[pr.id] = pr)
  }

  followingData = [...following].map(id => profMap[id]).filter(Boolean)
  followersData = [...followers].map(id => profMap[id]).filter(Boolean)

  const fc = friends.size, frc = followers.size, fwc = following.size
  document.getElementById('cnt-friends').textContent     = fc
  document.getElementById('cnt-followers').textContent   = frc
  document.getElementById('cnt-following').textContent   = fwc
  document.getElementById('tbadge-friends').textContent  = fc
  document.getElementById('tbadge-followers').textContent = frc
  document.getElementById('tbadge-following').textContent = fwc

  renderTab(activeTab)
}

// ====== TABS ======
window.switchTab = function(tab) {
  activeTab = tab
  ;['friends','followers','following','find'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab)
    const s = document.getElementById(`stat-${t}`)
    if (s) s.classList.toggle('active', t === tab)
  })
  const m = tabMeta[tab]
  document.getElementById('rightTitle').textContent = m.title
  document.getElementById('rightSub').textContent   = m.sub
  document.getElementById('frSearch').style.opacity = tab === 'find' ? '0' : '1'
  document.getElementById('frSearch').style.pointerEvents = tab === 'find' ? 'none' : ''
  renderTab(tab)
}

function renderTab(tab) {
  const el = document.getElementById('frContent')
  if (tab === 'friends') {
    const list = followingData.filter(u => friends.has(u.id))
    if (!list.length) { el.innerHTML = emptyHTML(`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:1.35em;height:1.35em;display:inline-block;vertical-align:middle;"><path d="M7.5 13.5c1.5 1.5 3.2 2.3 4.5 2.3 1.4 0 3.2-.8 4.5-2.3"/><path d="M7 12c-1.2-1.2-2-2.3-2-3.6 0-1.4 1.1-2.4 2.4-2.4 1 0 1.8.6 2.6 1.4"/><path d="M17 12c1.2-1.2 2-2.3 2-3.6 0-1.4-1.1-2.4-2.4-2.4-1 0-1.8.6-2.6 1.4"/></svg>`,'No friends yet','Follow someone and when they follow back, they\'ll show up here.','find'); return }
    el.innerHTML = `<div class="fr-grid">${list.map((u,i) => personCard(u,i)).join('')}</div>`
  } else if (tab === 'followers') {
    if (!followersData.length) { el.innerHTML = emptyHTML('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:1.35em;height:1.35em;display:inline-block;vertical-align:middle;"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="20 8 20 14 16 12"/></svg>','No followers yet','Post items and be active in the community!'); return }
    el.innerHTML = `<div class="fr-grid">${followersData.map((u,i) => personCard(u,i)).join('')}</div>`
  } else if (tab === 'following') {
    if (!followingData.length) { el.innerHTML = emptyHTML('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:1.35em;height:1.35em;display:inline-block;vertical-align:middle;"><path d="m12 17.27 4.8-3.86a4 4 0 0 0 2.2-3.41V8a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v1.99a4 4 0 0 0 2.2 3.41L12 17.27z" stroke-width="2.4"/><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/></svg>','Not following anyone','Discover swappers and follow them!','find'); return }
    el.innerHTML = `<div class="fr-grid">${followingData.map((u,i) => personCard(u,i)).join('')}</div>`
  } else if (tab === 'find') {
    el.innerHTML = `
      <div class="find-box">
        <div class="find-label">Search for a Swapper</div>
        <div class="find-row">
          <input class="find-inp" id="findInp" type="text" placeholder="Enter username or display name..." onkeydown="if(event.key==='Enter')searchPeople()"/>
          <button class="find-btn" onclick="searchPeople()">Search</button>
        </div>
      </div>
      <div id="findResults"></div>`
    setTimeout(() => document.getElementById('findInp')?.focus(), 50)
  }
}

function emptyHTML(icon, title, desc, findBtn = null) {
  return `<div class="fr-empty">
    <div class="fr-empty-icon">${icon}</div>
    <h4>${title}</h4>
    <p>${desc}</p>
    ${findBtn ? `<button class="fr-empty-btn" onclick="switchTab('${findBtn}')">Find People</button>` : ''}
  </div>`
}

// ====== PERSON CARD ======
function personCard(u, i) {
  const name = u.display_name || u.username || 'User'
  const ava  = u.avatar_url || av(name)
  const isFriend    = friends.has(u.id)
  const isFollowing = following.has(u.id)
  const isFollower  = followers.has(u.id)

  let badges = ''
  if (isFriend)                   badges += `<span class="pc-badge friends"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:1.05em;height:1.05em;display:inline-block;vertical-align:-0.15em;margin-right:.35em;"><path d="M7.5 13.5c1.5 1.5 3.2 2.3 4.5 2.3 1.4 0 3.2-.8 4.5-2.3"/><path d="M7 12c-1.2-1.2-2-2.3-2-3.6 0-1.4 1.1-2.4 2.4-2.4 1 0 1.8.6 2.6 1.4"/><path d="M17 12c1.2-1.2 2-2.3 2-3.6 0-1.4-1.1-2.4-2.4-2.4-1 0-1.8.6-2.6 1.4"/></svg>Friends</span>`
  if (isFollowing && !isFollower) badges += `<span class="pc-badge following">✨ Following</span>`
  if (isFollower && !isFollowing) badges += `<span class="pc-badge follower"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:middle;margin-right:0.25em;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Follows you</span>`

  const followBtn = isFollowing
    ? `<button class="btn-follow unfollow" onclick="toggleFollow('${u.id}',false,this)">Unfollow</button>`
    : `<button class="btn-follow follow" onclick="toggleFollow('${u.id}',true,this)">${isFollower ? 'Follow Back' : 'Follow'}</button>`

  return `<div class="person-card ${isFriend ? 'friend' : ''}" id="pc-${u.id}" style="animation-delay:${i * 35}ms">
    <img class="pc-av" src="${ava}" alt="${esc(name)}" onclick="location.href='../profile/profile.html?userId=${u.id}'"/>
    <div class="pc-info" onclick="location.href='../profile/profile.html?userId=${u.id}'">
      <div class="pc-name">${esc(name)}</div>
      <div class="pc-user">@${esc(u.username || 'user')}</div>
      <div class="pc-badges">${badges}</div>
    </div>
    <div class="pc-actions">
      <button class="btn-msg" title="Message" onclick="location.href='message.html?with=${u.id}'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="width:1.05em;height:1.05em;display:inline-block;vertical-align:-0.15em;"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg></button>
      ${followBtn}
    </div>
  </div>`
}

// ====== FOLLOW / UNFOLLOW ======
window.toggleFollow = async function(userId, doFollow, btn) {
  btn.disabled = true
  if (doFollow) {
    const { error } = await supabase.from('follows').insert({ follower_id: me.id, following_id: userId })
    if (error) { showToast('Could not follow. Try again.'); btn.disabled = false; return }
    following.add(userId)
    if (followers.has(userId)) friends.add(userId)
    showToast(friends.has(userId) ? 'You\'re now friends!' : 'Following!')
  } else {
    const { error } = await supabase.from('follows').delete().eq('follower_id', me.id).eq('following_id', userId)
    if (error) { showToast('Could not unfollow. Try again.'); btn.disabled = false; return }
    following.delete(userId)
    friends.delete(userId)
    showToast('Unfollowed.')
  }
  await loadAll()
}

// ====== FIND ======
window.searchPeople = async function() {
  const q = document.getElementById('findInp')?.value.trim()
  if (!q) return
  const el = document.getElementById('findResults')
  el.innerHTML = `<div class="ldr"><div class="spin"></div> Searching...</div>`
  const { data } = await supabase.from('profiles')
    .select('id,username,display_name,avatar_url')
    .or(`username.ilike.%${q}%,display_name.ilike.%${q}%`)
    .neq('id', me.id).limit(12)
  if (!data?.length) { el.innerHTML = emptyHTML('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:1.35em;height:1.35em;display:inline-block;vertical-align:middle;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-width="2.4"/></svg>','No results','Try a different name or username.'); return }
  el.innerHTML = `<div class="fr-grid">${data.map((u,i) => personCard(u,i)).join('')}</div>`
}

// ====== FILTER ======
window.filterCards = function(q) {
  document.querySelectorAll('.person-card').forEach(c => {
    const n = (c.querySelector('.pc-name')?.textContent || '').toLowerCase()
    const u = (c.querySelector('.pc-user')?.textContent || '').toLowerCase()
    c.style.display = (!q || n.includes(q.toLowerCase()) || u.includes(q.toLowerCase())) ? '' : 'none'
  })
}

// ====== MSG BADGE ======
async function updMsgBadge() {
  const { data } = await supabase.from('messages').select('id').eq('to_user_id', me.id).eq('read', false)
  const b = document.getElementById('msgBadge')
  if (data?.length) { b.textContent = data.length; b.style.display = 'flex' } else b.style.display = 'none'
}

// ====== UTILS ======
function av(n) { return `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=EBE0E3&color=C994A7&size=100` }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 3000)
}
window.doLogout = () => location.href = '../auth/login.html'
</script>
